
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netops-analyzer-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    # Permite acesso à rede para ICMP em alguns kernels
    sysctls:
      - net.ipv4.ping_group_range=0 2147483647

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: netops-analyzer-frontend
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - backend
